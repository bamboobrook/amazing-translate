<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazing Translate</title>
    <script type="module" src="/src/popup/popup.ts"></script>
  </head>
  <body>
    <main class="popup-shell">
      <header><p class="eyebrow">Amazing Translate</p><h1>网页翻译</h1></header>
      <dl class="meta"><div><dt>服务商</dt><dd id="provider">-</dd></div><div><dt>语言</dt><dd id="languages">-</dd></div></dl>
      <section class="actions">
        <button id="translatePage" type="button">翻译当前页</button>
        <button id="restorePage" type="button" class="secondary">恢复原文</button>
        <button id="openOptions" type="button" class="ghost">设置</button>
      </section>
      <p id="status" role="status"></p>
    </main>
  </body>
</html>
